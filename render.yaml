services:
  - type: web
    name: pickpulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.console_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATA_DIR
        value: /data
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: OAUTH_STATE_SECRET
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: API_BASE_URL
        sync: false
    disk:
      name: pickpulse-data
      mountPath: /data
      sizeGB: 1
